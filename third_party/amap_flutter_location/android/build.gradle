group 'com.amap.flutter.amap_flutter_location'
version '1.0'

apply plugin: 'com.android.library'

android {
    // AGP 8+ requires explicit namespace; use package of java sources
    namespace 'com.amap.flutter.location'
    // Align with app compile SDK to avoid DSL errors on AGP 8+
    compileSdkVersion 34

    defaultConfig {
        // AGP 8+ requires at least 21 for many modern plugin toolchains
        minSdkVersion 21
    }
    lintOptions {
        disable 'InvalidPackage'
    }
    dependencies {
        compileOnly 'com.amap.api:location:5.6.0'
    }
}

// Modern repositories (jcenter is sunset)
repositories {
    google()
    mavenCentral()
}
